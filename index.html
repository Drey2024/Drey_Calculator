<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drey Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex justify-center items-center h-screen m-0 font-sans text-center mt-7 text-white ">   
    <div class="bg-slate-600 p-6 rounded-lg shadow-lg mt-2 flex flex-col gap-4 max-w-full w-full sm:max-w-sm  sm:p-6 transition-all   ">

            <h1 class="text-2xl font-bold">Drey Calculator</h1>
            <p>Enter a mathematical expression to evaluate:</p>

            <div id="textarea">
                <input type="text" id="screen" placeholder="0" readonly class=" text-right  bg-slate-800 p-2 rounded-3xl  w-80 border-slate-700 shadow-inner ">
            </div>

      <div class="grid grid-cols-4 gap-3 mt-4 text-right  ">
            
            <button onclick="clearScreen()" class="col-span-2 bg-rose-600 hover:bg-rose-500 text-white font-bold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">C</button>
            <button onclick="appendValue('/')" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">/</button>
            <button onclick="appendValue('*')" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">×</button>

            <button onclick="appendValue('7')" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">7</button>
            <button onclick="appendValue('8')" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">8</button>
            <button onclick="appendValue('9')" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">9</button>
            <button onclick="appendValue('-')" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">-</button>

            <button onclick="appendValue('4')" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">4</button>
            <button onclick="appendValue('5')" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">5</button>
            <button onclick="appendValue('6')" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">6</button>
            <button onclick="appendValue('+')" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">+</button>

            <button onclick="appendValue('1')" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">1</button>
            <button onclick="appendValue('2')" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">2</button>
            <button onclick="appendValue('3')" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">3</button>
            
            <button onclick="calculateResult()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-extrabold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl flex justify-center items-center">=</button>

            <button onclick="appendValue('0')" class="col-span-2 bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">0</button>
            <button onclick="appendValue('.')" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold p-4 rounded-2xl cursor-pointer shadow-md transition-all active:scale-95 text-xl">.</button>

        </div>
    
    </div>

    <script src="calc.js"></script>
    

</body>
</html>
